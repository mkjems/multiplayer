<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10141d" />
    <title>Diagnostics — Multiplayer</title>
    <link rel="stylesheet" href="/diagnostics.css" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <p class="eyebrow">Developer diagnostics</p>
        <h1>Room Performance</h1>
      </div>
      <div class="refresh-status">
        <span id="connection-state" class="state-pill">Connecting</span>
        <span id="last-updated">Never updated</span>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="Server summary">
        <div class="summary-tile">
          <span class="summary-label">Rooms</span>
          <strong id="summary-rooms">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">Active</span>
          <strong id="summary-active">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">Players</span>
          <strong id="summary-players">0</strong>
        </div>
        <div class="summary-tile">
          <span class="summary-label">Skipped snapshots</span>
          <strong id="summary-skipped">0</strong>
        </div>
      </section>

      <section class="room-section" aria-labelledby="rooms-title">
        <div class="section-heading">
          <h2 id="rooms-title">Rooms</h2>
          <p id="generated-at">Waiting for server data</p>
        </div>
        <div id="rooms" class="room-grid">
          <div class="empty-state">Loading diagnostics...</div>
        </div>
      </section>
    </main>

    <script type="module" src="/diagnostics.ts"></script>
  </body>
</html>
