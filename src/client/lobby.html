<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Cowboys" />
    <meta name="theme-color" content="#0f0f1a" />
    <link rel="manifest" href="/manifest.json" />
    <title>Lobby — Multiplayer</title>
    <link rel="stylesheet" href="lobby.css" />
  </head>
  <body>
    <header>
      <h1>Multiplayer <span class="live-badge">LIVE</span></h1>
      <div class="player-info">
        <div class="player-name" id="lobby-count" style="display: none">
          <span id="lobby-count-number">0</span> in lobby
        </div>
        <div class="player-name">
          Playing as <span id="display-name">—</span>
        </div>
      </div>
    </header>

    <h2>Choose a game</h2>
    <section
      class="keyboard-controls"
      id="keyboard-controls"
      aria-labelledby="keyboard-controls-title"
    >
      <h2 id="keyboard-controls-title">Keyboard controls</h2>
      <ul class="control-list">
        <li>
          <span>Move</span>
          <span class="control-keys">
            <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd>
          </span>
        </li>
        <li>
          <span>Aim arm</span>
          <span class="control-keys"><kbd>A</kbd><kbd>Z</kbd></span>
        </li>
        <li>
          <span>Fire</span>
          <span class="control-keys"><kbd>X</kbd></span>
        </li>
        <li>
          <span>Reload</span>
          <span class="control-keys"><kbd>R</kbd></span>
        </li>
      </ul>
    </section>
    <div class="games" id="games">
      <div class="loading">Connecting to lobby...</div>
    </div>

    <script type="module" src="/lobby.ts"></script>
  </body>
</html>
