<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Cowboys" />
    <meta name="theme-color" content="#0f0f1a" />
    <link rel="manifest" href="/manifest.json" />
    <title>Multiplayer</title>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body>
    <div class="card">
      <h1>Multiplayer</h1>
      <p class="subtitle">Pick a name and jump into a game</p>

      <aside
        id="home-screen-suggestion"
        class="home-screen-suggestion"
        aria-live="polite"
        hidden
      >
        <button
          id="dismiss-home-screen-suggestion"
          class="dismiss-suggestion"
          type="button"
          aria-label="Dismiss home screen suggestion"
        >
          x
        </button>
        <strong>Add Cowboys to your Home Screen</strong>
        <p id="home-screen-instructions">
          Launching from Home Screen gives you the best fullscreen experience.
        </p>
      </aside>

      <form id="landing-form">
        <label for="name">Your name</label>
        <input
          type="text"
          id="name"
          placeholder="Enter your name..."
          maxlength="20"
          autocomplete="off"
        />

        <button id="enter" type="submit" disabled>Enter Lobby</button>
      </form>
    </div>

    <script type="module" src="/index.ts"></script>
  </body>
</html>
