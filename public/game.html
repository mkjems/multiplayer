<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game — Multiplayer</title>
    <link rel="stylesheet" href="game.css" />
  </head>
  <body>
    <nav>
      <span class="game-title" id="game-title">Game</span>
      <span id="player-count"></span>
      <button id="mute-btn" title="Toggle sound">🔊</button>
      <a href="/lobby.html">← Back to lobby</a>
    </nav>

    <div class="arena">
      <canvas id="canvas" width="1000" height="650"></canvas>
    </div>
    <p class="hint">
      Move: Arrows &nbsp;|&nbsp; Aim: A (up) Z (down) &nbsp;|&nbsp; Shoot: X
      &nbsp;|&nbsp; Reload: R
    </p>

    <div id="overlay">
      <h2 id="winner-text"></h2>
      <p id="countdown-text"></p>
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
